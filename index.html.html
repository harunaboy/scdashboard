<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>シナジーカフェ 経営ダッシュボード 16期</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f7f8fa;--bg3:#eef0f5;--border:#e0e4ec;--border2:#c8cdd8;--accent:#1a5fb4;--accent2:#2ec27e;--red:#c01c28;--yellow:#e5a50a;--text:#1c1c1e;--muted:#6b7280;--shadow:0 1px 4px rgba(0,0,0,0.08);--font:'Hiragino Sans','Meiryo','Segoe UI',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;}
/* HEADER */
.header{background:#fff;border-bottom:2px solid var(--accent);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header h1{font-size:17px;font-weight:700;color:var(--accent);}
.header h1 span{color:var(--text);font-weight:400;font-size:14px;margin-left:8px;}
.header-right{display:flex;gap:12px;align-items:center;}
.tax-switch-wrap{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tax-switch-label{font-size:12px;color:var(--muted);padding:0 4px;}
.tax-btn{padding:4px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
.tax-btn.active{background:var(--accent);color:#fff;}
.tax-btn:not(.active){background:transparent;color:var(--muted);}
.tax-indicator{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.tax-indicator.tax-in{background:#e8f0fc;color:var(--accent);}
.tax-indicator.tax-ex{background:#fef3c7;color:#92400e;}
/* FILTERS */
.filters{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.filters label{font-size:12px;color:var(--muted);font-weight:500;}
.filters select{background:#fff;border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;padding:0 24px;}
.tab-btn{padding:11px 22px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:.15s;margin-bottom:-2px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}
/* MAIN */
.main{padding:20px 24px;max-width:1600px;margin:0 auto;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.section-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;margin-top:20px;padding-left:2px;}
/* GROUP SUMMARY */
.group-summary{background:#f0f7ff;border:1.5px solid #bdd5f5;border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.group-summary-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.group-total-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.group-total-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.group-total-card .gtc-label{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:4px;}
.group-total-card .gtc-val{font-size:18px;font-weight:700;color:var(--text);}
.group-total-card .gtc-sub{font-size:11px;margin-top:3px;}
.group-store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.group-store-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.group-store-card h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.gsc-kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.gsc-kpi{text-align:center;}
.gsc-kpi .gk-label{font-size:9px;color:var(--muted);font-weight:500;}
.gsc-kpi .gk-val{font-size:13px;font-weight:700;color:var(--text);}
.gsc-kpi .gk-chip{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;display:inline-block;margin-top:1px;}
.chip-good{background:#dcfce7;color:#166534;}
.chip-bad{background:#fee2e2;color:#991b1b;}
.chip-neu{background:var(--bg3);color:var(--muted);}
/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;margin-bottom:24px;}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow);transition:.15s;}
.kpi-card:hover{border-color:var(--accent);}
.kpi-card.alert{border-left:4px solid var(--red);}
.kpi-card.good-card{border-left:4px solid var(--accent2);}
.kpi-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.dummy-badge{font-size:9px;background:#fef9c3;color:#92400e;border:1px solid #fde68a;border-radius:3px;padding:1px 4px;font-weight:700;}
.kpi-value{font-size:23px;font-weight:700;color:var(--text);line-height:1.1;margin-bottom:8px;}
.kpi-metas{display:flex;gap:6px;flex-wrap:wrap;}
.meta-chip{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;}
.meta-chip.good{background:#dcfce7;color:#166534;}
.meta-chip.bad{background:#fee2e2;color:#991b1b;}
.meta-chip.neu{background:var(--bg3);color:var(--muted);}
/* CHARTS */
.chart-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:var(--shadow);}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.chart-card select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;}
.chart-wrap{position:relative;height:260px;}
/* HEATMAP */
.heatmap-wrap{overflow-x:auto;margin-bottom:24px;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);}
.heatmap-table{border-collapse:collapse;min-width:100%;font-size:12px;}
.heatmap-table th{background:var(--bg3);padding:9px 12px;text-align:center;font-weight:700;color:var(--muted);white-space:nowrap;border:1px solid var(--border);}
.heatmap-table th.store-col{text-align:left;}
.heatmap-table td{padding:7px 10px;text-align:center;border:1px solid var(--border);white-space:nowrap;font-weight:600;font-size:12px;}
.heatmap-table td.store-name{text-align:left;position:sticky;left:0;background:#fff;font-weight:700;z-index:1;border-right:2px solid var(--border2);}
/* RANKING */
.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:24px;}
.rank-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow);}
.rank-card h3{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
.rank-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-item.highlight-store{background:#fffbeb;border-radius:6px;padding:6px 8px;margin:0 -8px;}
.rank-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.rank-num.r1{background:#f59e0b;color:#fff;}.rank-num.r2{background:#9ca3af;color:#fff;}.rank-num.r3{background:#cd7c32;color:#fff;}.rank-num.rn{background:var(--bg3);color:var(--muted);}
.rank-num.r-hl{background:#1a5fb4;color:#fff;}
.rank-bar-wrap{flex:1;}.rank-store{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text);}
.rank-bar-bg{background:var(--bg3);border-radius:3px;height:5px;}
.rank-bar-fill{height:5px;border-radius:3px;background:var(--accent);}
.rank-bar-fill.hl{background:#f59e0b;}
.rank-val{font-size:12px;font-weight:700;min-width:70px;text-align:right;color:var(--accent);}
/* TIME */
.time-heatmap{overflow-x:auto;}
.time-table{border-collapse:collapse;font-size:11px;}
.time-table th,.time-table td{border:1px solid var(--border);padding:4px 7px;text-align:center;white-space:nowrap;}
.time-table th{background:var(--bg3);color:var(--muted);font-weight:700;}
/* PL */
.pl-wrap{overflow:auto;max-height:700px;border-radius:8px;}
.pl-table{border-collapse:collapse;width:100%;font-size:12px;}
.pl-table th{background:var(--bg3);padding:8px 12px;text-align:right;font-weight:700;color:var(--muted);white-space:nowrap;border:1px solid var(--border);position:sticky;top:0;z-index:2;}
.pl-table th:first-child{text-align:left;position:sticky;left:0;z-index:3;border-right:2px solid var(--border2);}
.pl-table td{padding:6px 12px;text-align:right;border:1px solid var(--border);white-space:nowrap;}
.pl-table td:first-child{text-align:left;position:sticky;left:0;background:#fff;font-weight:600;z-index:1;border-right:2px solid var(--border2);}
.pl-table tr:hover td{background:#f0f7ff;}
.pl-table tr.section td{background:#eef3fb;color:var(--accent);font-weight:700;font-size:11px;letter-spacing:.04em;}
.pl-table tr.section td:first-child{background:#eef3fb;}
.pl-table tr.total-row td{font-weight:700;background:#f0f7ff;color:var(--accent);}
.pl-table tr.total-row td:first-child{background:#f0f7ff;}
.pl-table tr.budget-row td{background:#fafafa;color:var(--muted);font-style:italic;}
.pl-table tr.budget-row td:first-child{background:#fafafa;color:var(--muted);}
.pl-table tr.diff-row td{background:#fffbeb;}
.pl-table tr.diff-row td:first-child{background:#fffbeb;color:#92400e;}
.pl-table tr.ach-row td{background:#f0fdf4;}
.pl-table tr.ach-row td:first-child{background:#f0fdf4;color:#166534;}
.pl-table .anomaly{background:#fee2e2!important;color:var(--red);font-weight:700;}
.pl-table .positive{color:#166534;}.pl-table .negative{color:var(--red);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.mb16{margin-bottom:16px;}
.tax-note{font-size:11px;color:var(--muted);background:#fef9c3;border:1px solid #fde68a;border-radius:6px;padding:4px 10px;display:inline-flex;align-items:center;gap:4px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div id="pw-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f7f8fa;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #e0e4ec;border-radius:16px;padding:40px 48px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;max-width:360px;width:90%;">
    <div style="font-size:28px;margin-bottom:8px;">🔐</div>
    <h2 style="font-size:18px;font-weight:700;color:#1a5fb4;margin-bottom:4px;">シナジーカフェ</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:24px;">経営ダッシュボード</p>
    <input type="password" id="pw-input" placeholder="パスワードを入力"
      style="width:100%;padding:10px 14px;border:1.5px solid #e0e4ec;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')checkPW()"
    />
    <button onclick="checkPW()"
      style="width:100%;padding:10px;background:#1a5fb4;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
      ログイン
    </button>
    <p id="pw-error" style="color:#c01c28;font-size:12px;margin-top:10px;display:none;">パスワードが違います</p>
    <p style="font-size:11px;color:#9ca3af;margin-top:20px;">© 株式会社シナジーカフェ</p>
  </div>
</div>
<script>
(function(){
  const HASH = 'e265b42c8cbd09bff0613240c5a1f20e90fed4fae3845416355b4e93018cd041';
  const KEY = 'sc_db_auth';
  async function sha256(msg){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function checkPW(){
    const v = document.getElementById('pw-input').value;
    const h = await sha256(v);
    if(h === HASH){
      sessionStorage.setItem(KEY,'1');
      document.getElementById('pw-screen').style.display='none';
      document.getElementById('pw-error').style.display='none';
    } else {
      document.getElementById('pw-error').style.display='block';
      document.getElementById('pw-input').value='';
    }
  }
  window.checkPW = checkPW;
  if(sessionStorage.getItem(KEY)==='1'){
    document.getElementById('pw-screen').style.display='none';
  }
})();
</script>

<div class="header">
  <h1>シナジーカフェ <span>経営ダッシュボード｜16期 2025/03〜2026/02（税込表示）</span></h1>
  <div class="header-right">
    <div class="tax-switch-wrap">
      <span class="tax-switch-label">表示</span>
      <button class="tax-btn active" id="btnTaxIn" onclick="setTax(true)">税込</button>
      <button class="tax-btn" id="btnTaxEx" onclick="setTax(false)">税抜</button>
    </div>
    <span class="tax-indicator tax-in" id="taxIndicator">税込表示中</span>
  </div>
</div>
<div class="filters">
  <label>対象月</label><select id="filterMonth"></select>
  <label>店舗</label><select id="filterStore"></select>
  <label>グループ</label><select id="filterGroup"></select>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tab1',this)">📊 KPIダッシュボード</button>
  <button class="tab-btn" onclick="switchTab('tab2',this)">📈 トレンド分析</button>
  <button class="tab-btn" onclick="switchTab('tab3',this)">⏰ 時間帯分析</button>
  <button class="tab-btn" onclick="switchTab('tab4',this)">📋 詳細PL表</button>
</div>
<div class="main">
<div id="tab1" class="tab-panel active">
  <div id="groupSummaryWrap"></div>

  <div class="kpi-grid" id="kpiGrid"></div>
  <p class="section-title">店舗別ヒートマップ</p>
  <div class="heatmap-wrap"><table class="heatmap-table" id="heatmapTable"></table></div>
  <p class="section-title">店舗ランキング</p>
  <div class="rank-grid" id="rankGrid"></div>
</div>

    <h3>月次トレンド
      <select id="trendMetric">
        <option value="売上高">売上</option><option value="人件費率">人件費率</option>
        <option value="原価率">原価率</option><option value="FL率">FL率</option>
        <option value="人時売上高">人時売上高</option><option value="消費税引き後利益">消費税引き後利益</option>
        <option value="消費税引き後利益率">消費税引き後利益率</option><option value="消費税引き後利益率">消費税引き後利益率</option>
        <option value="客数">客数</option><option value="客単価">客単価</option>
        <option value="ランチ比率">ランチ比率</option><option value="ディナー比率">ディナー比率</option>
      </select>
    </h3>
    <div class="chart-wrap" style="height:320px;"><canvas id="trendChart"></canvas></div>
  </div>
  <div class="two-col">
    <div class="chart-card"><h3>ランチ vs ディナー 売上構成</h3><div class="chart-wrap"><canvas id="ldChart"></canvas></div></div>
    <div class="chart-card"><h3>決済手段比率（現金 / クレジット / その他）</h3><div class="chart-wrap"><canvas id="payChart"></canvas></div></div>
  </div>
  <div class="two-col">
    <div class="chart-card"><h3>FL率トレンド（月次）</h3><div class="chart-wrap"><canvas id="flChart"></canvas></div></div>
    <div class="chart-card"><h3>割引件数・金額トレンド</h3><div class="chart-wrap"><canvas id="discountChart"></canvas></div></div>
  </div>
</div>
<div id="tab3" class="tab-panel">
  <div class="chart-card mb16">
    <h3>時間帯別 売上・客数 <select id="timeMetricSel"><option value="売上">売上</option><option value="客数">客数</option></select></h3>
    <div class="chart-wrap" style="height:300px;"><canvas id="timeBarChart"></canvas></div>
  </div>
  <div class="chart-card"><h3>店舗別 時間帯ヒートマップ（万円）</h3><div class="time-heatmap" id="timeHeatmap"></div></div>
</div>
<div id="tab4" class="tab-panel">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;">
    <div><label style="font-size:12px;color:var(--muted);font-weight:500;margin-right:6px;">表示切替</label>
    <select id="plView"><option value="store">店舗別</option><option value="month">月別</option></select></div>
    <span class="tax-note" id="plTaxNote">💴 税込表示中</span>
  </div>
  <div class="chart-card"><div class="pl-wrap" id="plWrap"></div></div>
</div>

// グループ選択 → 店舗選択をリセット、店舗選択 → グループをリセット
selGroup.addEventListener('change',()=>{if(selGroup.value)selStore.value='';renderAll();});
selStore.addEventListener('change',()=>{if(selStore.value)selGroup.value='';renderAll();});

// アクティブな店舗リストを返す
function getActiveStores(){
  if(selStore.value) return [selStore.value];
  if(selGroup.value) return GROUPS[selGroup.value].filter(s=>allStores.includes(s));
  return allStores;
}

function gf(){
  const sl=getActiveStores();
  let d=RAW.filter(r=>sl.includes(r.店舗名));
  if(selMonth.value) d=d.filter(r=>r.年月===selMonth.value);
  return d;
}
function gfa(){
  const sl=getActiveStores();
  return RAW.filter(r=>sl.includes(r.店舗名));
}

// ── ユーティリティ ──────────────────────────────────────
function sk(a,k){return a.reduce((s,b)=>s+(b[k]||0),0);}
function ak(a,k){const v=a.filter(r=>r[k]!=null&&!isNaN(r[k]));return v.length?v.reduce((s,b)=>s+(b[k]||0),0)/v.length:null;}
function fmt(v,t){
  if(v==null||isNaN(v))return'—';
  if(t==='money')return'¥'+Math.round(v).toLocaleString();
  if(t==='moneyM')return'¥'+Math.round(v/10000).toLocaleString()+'万';
  if(t==='pct')return v.toFixed(1)+'%';
  if(t==='num')return Math.round(v).toLocaleString();
  if(t==='dec')return v.toFixed(1);
  return v;
}
function hBg(v,gh){if(v==null)return'#f7f8fa';if(gh){if(v>=100)return'#dcfce7';if(v>=90)return'#fef9c3';return'#fee2e2';}else{if(v<=100)return'#dcfce7';if(v<=110)return'#fef9c3';return'#fee2e2';}}
function hCl(v,gh){if(v==null)return'#9ca3af';if(gh){if(v>=100)return'#166534';if(v>=90)return'#92400e';return'#991b1b';}else{if(v<=100)return'#166534';if(v<=110)return'#92400e';return'#991b1b';}}
const COLORS=['#1a5fb4','#2ec27e','#e5a50a','#c01c28','#7357b0','#e66100','#0077c8','#c64600','#1c8e4a','#b5890a','#5c3566','#1b6fa8'];
const GC='#e0e4ec',TC='#6b7280';
let charts={};
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

// ── グループサマリー ────────────────────────────────────
function renderGroupSummary(){
  const wrap=document.getElementById('groupSummaryWrap');
  if(!selGroup.value){wrap.innerHTML='';return;}
  const gName=selGroup.value;
  const gStores=GROUPS[gName].filter(s=>allStores.includes(s));
  const d=gf(); // 月フィルター適用済み
  if(!d.length){wrap.innerHTML='';return;}

  // グループ合計
  const gSales=ta(sk(d,'売上高'),'売上高');
  const gBudget=ta(sk(d,'売上予算'),'売上予算');
  const gAch=gBudget>0?gSales/gBudget*100:null;
  const gDiff=gBudget>0?gSales-gBudget:null;
  const gOpProfit=ta(sk(d,'消費税引き後利益'),'消費税引き後利益');
  const gOpRate=gSales>0?gOpProfit/gSales*100:null;
  const gLaborRate=ta(sk(d,'人件費'),'人件費')/gSales*100;
  const gCogRate=ta(sk(d,'仕入高'),'仕入高')/gSales*100;

  function chip(val,good){
    if(val==null)return'';
    const cls=good?'chip-good':'chip-bad';
    return`<span class="gk-chip ${cls}">${val}</span>`;
  }
  function achChip(v){if(v==null)return'';const cls=v>=100?'chip-good':'chip-bad';return`<span class="gk-chip ${cls}">${v.toFixed(1)}%</span>`;}

  // グループ合計カード
  const totalHTML=`
    <div class="group-total-card"><div class="gtc-label">グループ売上</div><div class="gtc-val">${fmt(gSales,'moneyM')}</div><div class="gtc-sub">${achChip(gAch)} 予算比</div></div>
    <div class="group-total-card"><div class="gtc-label">予実差</div><div class="gtc-val" style="color:${gDiff>=0?'#166534':'#991b1b'}">${gDiff!=null?(gDiff>=0?'+':'')+fmt(gDiff,'moneyM'):'—'}</div></div>
    <div class="group-total-card"><div class="gtc-label">税後利益率</div><div class="gtc-val">${fmt(gOpRate,'pct')}</div></div>
    <div class="group-total-card"><div class="gtc-label">人件費率</div><div class="gtc-val">${fmt(gLaborRate,'pct')}</div></div>
    <div class="group-total-card"><div class="gtc-label">原価率</div><div class="gtc-val">${fmt(gCogRate,'pct')}</div></div>
  `;

  // 各店カード（9大KPI）
  const storeCards=gStores.map(store=>{
    const sd=d.filter(r=>r.店舗名===store);
    if(!sd.length) return`<div class="group-store-card"><h4>${store}</h4><p style="color:var(--muted);font-size:12px;">データなし</p></div>`;
    const s=ta(sk(sd,'売上高'),'売上高');
    const sb=ta(sk(sd,'売上予算'),'売上予算');
    const sa=sb>0?s/sb*100:null;
    const lr=ta(sk(sd,'人件費'),'人件費')/s*100;
    const lb=ak(sd,'人件費率予算');
    const cr=ta(sk(sd,'仕入高'),'仕入高')/s*100;
    const cb=ak(sd,'原価率予算');
    const ji=ta(sk(sd,'売上高'),'売上高')/sk(sd,'実労働時間');
    const jb=ak(sd,'人時売上予算');
    const op=ta(sk(sd,'消費税引き後利益'),'消費税引き後利益');
    const or2=op/s*100;
    const pb=ak(sd,'利益率予算');
    const appDL=ak(sd,'アプリDL率');
    const gmb=ak(sd,'GMB口コミ数');
    const sh=ak(sd,'シフト乖離回数');

    function mkpi(label,val,chip){return`<div class="gsc-kpi"><div class="gk-label">${label}</div><div class="gk-val">${val}</div>${chip}</div>`;}
    function achC(v){if(v==null)return'';const cls=v>=100?'chip-good':'chip-bad';return`<span class="gk-chip ${cls}">${v.toFixed(1)}%</span>`;}
    function diffC(v,gl){if(v==null)return'';const cls=gl?(v<=0?'chip-good':'chip-bad'):(v>=0?'chip-good':'chip-bad');return`<span class="gk-chip ${cls}">${(v>=0?'+':'')+v.toFixed(1)}pt</span>`;}

    return`<div class="group-store-card">
      <h4>${store}</h4>
      <div class="gsc-kpi-grid">
        ${mkpi('売上',fmt(ta(s,'売上高'),'moneyM'),achC(sa))}
        ${mkpi('人件費率',fmt(lr,'pct'),lb!=null?diffC(lr-lb,true):'')}
        ${mkpi('原価率',fmt(cr,'pct'),cb!=null?diffC(cr-cb,true):'')}
        ${mkpi('人時売上高','¥'+Math.round(ji).toLocaleString(),jb!=null?achC(ji/jb*100):'')}
        ${mkpi('税後利益率',fmt(or2,'pct'),pb!=null?diffC(or2-pb,false):'')}
        ${mkpi('営業利益',fmt(op,'moneyM'),'')}
        ${mkpi('アプリDL★',fmt(appDL,'pct'),'')}
        ${mkpi('GMB★',fmt(gmb,'dec')+'件','')}
        ${mkpi('シフト乖離★',fmt(sh,'dec')+'回','')}
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML=`
    <div class="group-summary">
      <div class="group-summary-title">📦 ${gName} グループサマリー</div>
      <div class="group-total-grid">${totalHTML}</div>
      <div class="group-store-grid">${storeCards}</div>
    </div>`;
}

// ── KPI スコアカード ────────────────────────────────────
function renderKPI(){
  const d=gf();
  if(!d.length){document.getElementById('kpiGrid').innerHTML='<p style="color:var(--muted)">データなし</p>';return;}
  const ts=ta(sk(d,'売上高'),'売上高');
  const bs=ta(sk(d,'売上予算'),'売上予算');
  const lr=ta(sk(d,'人件費'),'人件費')/ts*100;
  const lb=ak(d,'人件費率予算');
  const cr=ta(sk(d,'仕入高'),'仕入高')/ts*100;
  const cb=ak(d,'原価率予算');
  const ji=ta(sk(d,'売上高'),'売上高')/sk(d,'実労働時間');
  const jb=ak(d,'人時売上予算');
  const op=ta(sk(d,'消費税引き後利益'),'消費税引き後利益');
  const or2=op/ts*100;
  const pb=ak(d,'利益率予算');
  const sa=bs>0?ts/bs*100:null;
  const appDL=ak(d,'アプリDL率');
  const gmb=ak(d,'GMB口コミ数');
  const sh=ak(d,'シフト乖離回数');

  const kpis=[
    {label:'売上',dummy:false,value:fmt(ts,'money'),metas:[{label:'予算比',val:sa,type:'pa',gh:true},{label:'昨対',val:null,dummy:true}]},
    {label:'人件費率',dummy:false,value:fmt(lr,'pct'),metas:[{label:'目標差',val:lb!=null?lr-lb:null,type:'dp',gl:true,ref:lb},{label:'昨対',val:null,dummy:true}]},
    {label:'原価率（仕入高率）',dummy:false,value:fmt(cr,'pct'),metas:[{label:'目標差',val:cb!=null?cr-cb:null,type:'dp',gl:true,ref:cb},{label:'昨対',val:null,dummy:true}]},
    {label:'人時売上高',dummy:false,value:fmt(ji,'money')+'/h',metas:[{label:'目標比',val:jb!=null?ji/jb*100:null,type:'pa',gh:true},{label:'昨対',val:null,dummy:true}]},
    {label:'消費税引き後利益（額）',dummy:false,value:fmt(op,'money'),metas:[{label:'昨対',val:null,dummy:true}]},
    {label:'消費税引き後利益率',dummy:false,value:fmt(or2,'pct'),metas:[{label:'目標差',val:pb!=null?or2-pb:null,type:'dp',gh:true,ref:pb},{label:'昨対',val:null,dummy:true}]},
    {label:'アプリDL率',dummy:true,value:fmt(appDL,'pct'),metas:[{label:'予算',val:null,dummy:true}]},
    {label:'GMB口コミ数',dummy:true,value:fmt(gmb,'dec')+'件',metas:[{label:'予算',val:null,dummy:true}]},
    {label:'シフト乖離回数',dummy:true,value:fmt(sh,'dec')+'回',metas:[{label:'予算',val:null,dummy:true}]},
  ];
  document.getElementById('kpiGrid').innerHTML=kpis.map(kpi=>{
    let isAlert=false,isGood=false;
    const mh=kpi.metas.map(m=>{
      if(m.dummy||m.val==null)return`<span class="meta-chip neu">${m.label}:★ダミー</span>`;
      let cls='neu',txt='';
      if(m.type==='pa'){txt=m.val.toFixed(1)+'%';cls=m.gh?(m.val>=100?'good':'bad'):(m.val<=100?'good':'bad');}
      else if(m.type==='dp'){txt=(m.val>=0?'+':'')+m.val.toFixed(1)+'pt (目標'+m.ref.toFixed(1)+'%)';cls=m.gl?(m.val<=0?'good':'bad'):(m.val>=0?'good':'bad');}
      if(cls==='bad')isAlert=true;if(cls==='good')isGood=true;
      return`<span class="meta-chip ${cls}">${m.label}: ${txt}</span>`;
    }).join('');
    const cc=isAlert&&!isGood?'alert':isGood&&!isAlert?'good-card':'';
    const db=kpi.dummy?'<span class="dummy-badge">★ダミー</span>':'';
    return`<div class="kpi-card ${cc}"><div class="kpi-label">${kpi.label} ${db}</div><div class="kpi-value">${kpi.value}</div><div class="kpi-metas">${mh}</div></div>`;
  }).join('');
}

// ── ヒートマップ ────────────────────────────────────────
function renderHeatmap(){
  const d=gf();
  const sl=[...new Set(d.map(r=>r.店舗名))].sort();
  if(!sl.length)return;
  const cols=[
    {key:'売上高',label:'売上',mk:true,ach:true,achRef:'売上予算',gh:true},
    {key:'人件費率',label:'人件費率',fmt:'pct',ach:true,achRef:'人件費率予算',gh:false},
    {key:'原価率',label:'原価率',fmt:'pct',ach:true,achRef:'原価率予算',gh:false},
    {key:'FL率',label:'FL率',fmt:'pct'},
    {key:'人時売上高',label:'人時売上高',mk:true,ach:true,achRef:'人時売上予算',gh:true},
    {key:'経常利益率',label:'消費税引き後利益率',fmt:'pct',ach:true,achRef:'利益率予算',gh:true},
    {key:'客単価',label:'客単価',mk:true},
    {key:'アプリDL率',label:'アプリDL★',fmt:'pct',dummy:true},
    {key:'GMB口コミ数',label:'GMB★',fmt:'dec',dummy:true},
  ];
  const th=`<tr><th class="store-col">店舗</th>`+cols.map(c=>`<th>${c.label}</th>`).join('')+'</tr>';
  const tb=sl.map(store=>{
    const sd=d.filter(r=>r.店舗名===store);
    const tds=cols.map(col=>{
      let raw=(col.key==='売上高'||col.key==='営業利益')?sk(sd,col.key):ak(sd,col.key);
      let val=col.mk?ta(raw,col.key):raw;
      let disp='—',bg='#f7f8fa',cl='#9ca3af';
      if(val!=null&&!isNaN(val)){
        if(col.mk&&col.key==='売上高')disp='¥'+Math.round(val/10000)+'万';
        else if(col.mk)disp='¥'+Math.round(val).toLocaleString();
        else if(col.fmt==='pct')disp=val.toFixed(1)+'%';
        else if(col.fmt==='dec')disp=val.toFixed(1);
        if(col.ach){const ref=ak(sd,col.achRef);if(ref!=null&&ref!==0){const r=val/ref*100;bg=hBg(r,col.gh);cl=hCl(r,col.gh);}}
        if(col.dummy){bg='#fef9c3';cl='#92400e';}
      }
      return`<td style="background:${bg};color:${cl}">${disp}</td>`;
    }).join('');
    return`<tr><td class="store-name">${store}</td>${tds}</tr>`;
  }).join('');
  document.getElementById('heatmapTable').innerHTML=`<thead>${th}</thead><tbody>${tb}</tbody>`;
}

// ── ランキング ──────────────────────────────────────────
function renderRanking(){
  const d=gf();
  const isSingleStore=!!selStore.value;
  const selectedStore=selStore.value;

  // 単店選択時は全店舗データでランキング計算（何位かを示すため）
  const rankData = isSingleStore
    ? RAW.filter(r=>selMonth.value?r.年月===selMonth.value:true)
    : d;
  const rankStores=[...new Set(rankData.map(r=>r.店舗名))].sort();

  if(!rankStores.length){document.getElementById('rankGrid').innerHTML='';return;}

  function bRank(metric,label,fmtFn,gh=true,mk=false,isDummy=false){
    const vals=rankStores.map(s=>{
      const sd=rankData.filter(r=>r.店舗名===s);
      let raw=(metric==='売上高'||metric==='消費税引き後利益')?sk(sd,metric):ak(sd,metric);
      return{store:s,val:mk?ta(raw,metric):raw};
    }).filter(r=>r.val!=null&&!isNaN(r.val));
    vals.sort((a,b)=>gh?b.val-a.val:a.val-b.val);
    const mx=Math.max(...vals.map(r=>Math.abs(r.val)));

    const dummyBadge=isDummy?'<span class="dummy-badge" style="margin-left:4px">★ダミー</span>':'';

    // 単店選択：選択店舗の行だけ強調表示
    const items=vals.map((r,i)=>{
      const isHL=isSingleStore&&r.store===selectedStore;
      if(isSingleStore&&!isHL)return''; // 単店時は対象店舗のみ表示
      const p=mx>0?Math.abs(r.val)/mx*100:0;
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      const numCls=isHL?'r-hl':rc;
      const barCls=isHL?'hl':'';
      const hlCls=isHL?'highlight-store':'';
      const rank=i+1;
      const rankLabel=isHL?`${rank}位 / ${vals.length}店中`:`${rank}`;
      return`<div class="rank-item ${hlCls}">
        <div class="rank-num ${numCls}" style="width:${isHL?'auto':''};padding:${isHL?'0 6px':''};border-radius:${isHL?'10px':''}">${rankLabel}</div>
        <div class="rank-bar-wrap">
          <div class="rank-store">${r.store}</div>
          <div class="rank-bar-bg"><div class="rank-bar-fill ${barCls}" style="width:${p}%"></div></div>
        </div>
        <div class="rank-val">${fmtFn(r.val)}</div>
      </div>`;
    }).filter(Boolean).join('');

    if(!items)return'';
    return`<div class="rank-card"><h3>${label}${dummyBadge}</h3>${items}</div>`;
  }

  const cards=[
    bRank('売上高','売上ランキング',v=>'¥'+Math.round(ta(v,'売上高')/10000)+'万',true,true),
    bRank('消費税引き後利益率','税後利益率ランキング',v=>v.toFixed(1)+'%',true,false),
    bRank('人時売上高','人時売上高ランキング',v=>'¥'+Math.round(ta(v,'人時売上高')).toLocaleString(),true,false),
    bRank('FL率','FL率ランキング（低い順）',v=>v.toFixed(1)+'%',false,false),
    bRank('原価率','原価率ランキング（低い順）',v=>v.toFixed(1)+'%',false,false),
    bRank('人件費率','人件費率ランキング（低い順）',v=>v.toFixed(1)+'%',false,false),
    bRank('アプリDL率','アプリDL率ランキング',v=>v.toFixed(1)+'%',true,false,true),
    bRank('GMB口コミ数','GMB獲得数ランキング',v=>Math.round(v)+'件',true,false,true),
  ].filter(Boolean).join('');

  document.getElementById('rankGrid').innerHTML=cards||'<p style="color:var(--muted)">ランキングデータなし</p>';
}

      {label:'人件費率%',data:months.map(m=>{const md=allD.filter(r=>r.年月===m);return ak(md,'人件費率');}),borderColor:'#1a5fb4',tension:.3,pointRadius:3},
      {label:'原価率%',data:months.map(m=>{const md=allD.filter(r=>r.年月===m);return ak(md,'原価率');}),borderColor:'#2ec27e',tension:.3,pointRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:TC,font:{size:11}}}},scales:{x:{ticks:{color:TC},grid:{color:GC}},y:{ticks:{color:TC,callback:v=>v+'%'},grid:{color:GC}}}}
  });
  dc('discount');
  charts['discount']=new Chart(document.getElementById('discountChart').getContext('2d'),{
    type:'bar',data:{labels:months,datasets:[
      {label:'割引件数',data:months.map(m=>{const md=allD.filter(r=>r.年月===m);return sk(md,'割引件数');}),backgroundColor:'#e6610088',yAxisID:'y'},
      {label:'割引金額(円)',data:months.map(m=>{const md=allD.filter(r=>r.年月===m);return ta(sk(md,'割引金額'),'割引金額');}),type:'line',borderColor:'#c01c28',tension:.3,yAxisID:'y2'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:TC,font:{size:11}}}},scales:{x:{ticks:{color:TC},grid:{color:GC}},y:{ticks:{color:TC},grid:{color:GC},position:'left'},y2:{ticks:{color:'#c01c28'},grid:{display:false},position:'right'}}}
  });
  document.getElementById('trendMetric').onchange=renderTrend;
}

// ── 時間帯 ──────────────────────────────────────────────
function renderTime(){
  const metric=document.getElementById('timeMetricSel').value;
  const sl=getActiveStores();
  let td=TIME_RAW.filter(r=>sl.includes(r.店舗名));
  if(selMonth.value)td=td.filter(r=>r.年月===selMonth.value);
  const hours=[...new Set(td.map(r=>r.時間))].sort((a,b)=>a-b);
  const hVals=hours.map(h=>{let v=td.filter(r=>r.時間===h).reduce((a,b)=>a+(b[metric]||0),0);return metric==='売上'?ta(v,'売上高'):v;});
  const mx=Math.max(...hVals);
  dc('timeBar');
  charts['timeBar']=new Chart(document.getElementById('timeBarChart').getContext('2d'),{
    type:'bar',
    data:{labels:hours.map(h=>h+'時'),datasets:[{label:metric,data:hVals,backgroundColor:hVals.map(v=>v===mx?'#e5a50a':'#1a5fb466'),borderColor:hVals.map(v=>v===mx?'#c07800':'#1a5fb4'),borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:TC},grid:{color:GC}},y:{ticks:{color:TC},grid:{color:GC}}}}
  });
  let ftd=TIME_RAW.filter(r=>sl.includes(r.店舗名));
  if(selMonth.value)ftd=ftd.filter(r=>r.年月===selMonth.value);
  const allH=[...new Set(ftd.map(r=>r.時間))].sort((a,b)=>a-b);
  const sMx={};
  sl.forEach(s=>{const sd=ftd.filter(r=>r.店舗名===s);sMx[s]=Math.max(...allH.map(h=>sd.filter(r=>r.時間===h).reduce((a,b)=>a+(b['売上']||0),0)));});
  const tH='<tr><th>店舗</th>'+allH.map(h=>`<th>${h}時</th>`).join('')+'</tr>';
  const tB=sl.filter(s=>RAW.some(r=>r.店舗名===s)).map(s=>{
    const sd=ftd.filter(r=>r.店舗名===s);
    const tds=allH.map(h=>{
      let v=sd.filter(r=>r.時間===h).reduce((a,b)=>a+(b['売上']||0),0);
      v=ta(v,'売上高');
      const p=sMx[s]>0?v/sMx[s]:0;
      const op=(p*0.75+0.05).toFixed(2);
      const disp=v>0?(v/10000).toFixed(1)+'万':'';
      return`<td style="background:rgba(26,95,180,${op});color:${p>0.5?'#fff':'#1a3a5c'}">${disp}</td>`;
    }).join('');
    return`<tr><th style="text-align:left;background:var(--bg3);color:var(--muted);font-weight:600">${s}</th>${tds}</tr>`;
  }).join('');
  document.getElementById('timeHeatmap').innerHTML=`<table class="time-table"><thead>${tH}</thead><tbody>${tB}</tbody></table>`;
  document.getElementById('timeMetricSel').onchange=renderTime;
}

// ── PL表 ────────────────────────────────────────────────
function renderPL(){
  const view=document.getElementById('plView').value;
  const sl=getActiveStores();
  let d=RAW.filter(r=>sl.includes(r.店舗名));
  if(selMonth.value)d=d.filter(r=>r.年月===selMonth.value);

  const plRows=[
    {type:'section',label:'【売上高】'},
    {key:'売上高',label:'売上高（実績）',fmt:'money',mk:true,total:true},
    {key:'売上予算',label:'　売上予算',fmt:'money',mk:true,rowCls:'budget-row'},
    {key:'_diff',label:'　予実差',fmt:'money',mk:true,rowCls:'diff-row',isDiff:true,aKey:'売上高',bKey:'売上予算'},
    {key:'_ach',label:'　達成率',fmt:'pct',rowCls:'ach-row',isAch:true,aKey:'売上高',bKey:'売上予算'},
    {key:'客数',label:'客数',fmt:'num'},{key:'客単価',label:'客単価',fmt:'money',mk:true},
    {key:'組数',label:'組数',fmt:'num'},{key:'組単価',label:'組単価',fmt:'money',mk:true},
    {key:'割引件数',label:'割引件数',fmt:'num'},{key:'割引金額',label:'割引金額',fmt:'money',mk:true},
    {type:'section',label:'【売上原価】'},
    {key:'仕入高',label:'仕入高',fmt:'money',mk:true},{key:'原価率',label:'原価率',fmt:'pct'},
    {type:'section',label:'【人件費】'},
    {key:'人件費',label:'人件費（勤怠ベース）',fmt:'money',mk:true},{key:'人件費率',label:'人件費率',fmt:'pct'},
    {key:'実労働時間',label:'実労働時間（h）',fmt:'dec'},{key:'人時売上高',label:'人時売上高',fmt:'money',mk:true},
    {type:'section',label:'【FL合計】'},
    {key:'FL合計',label:'FL合計',fmt:'money',mk:true},{key:'FL率',label:'FL率',fmt:'pct'},
    {type:'section',label:'【販管費】'},
    {key:'広告宣伝費',label:'広告宣伝費',fmt:'money',mk:true},{key:'旅費交通費',label:'旅費交通費',fmt:'money',mk:true},
    {key:'通信費',label:'通信費',fmt:'money',mk:true},{key:'販売促進費',label:'販売促進費',fmt:'money',mk:true},
    {key:'消耗品費',label:'消耗品費',fmt:'money',mk:true},{key:'修繕費',label:'修繕費 ⚠',fmt:'money',mk:true,anomaly:true},
    {key:'水道光熱費',label:'水道光熱費',fmt:'money',mk:true},{key:'地代家賃',label:'地代家賃',fmt:'money',mk:true},
    {key:'一般維持費',label:'一般維持費',fmt:'money',mk:true},{key:'福利厚生費',label:'福利厚生費',fmt:'money',mk:true},
    {key:'減価償却費',label:'減価償却費',fmt:'money',mk:true},{key:'租税公課',label:'租税公課',fmt:'money',mk:true},
    {key:'研究開発費',label:'研究開発費',fmt:'money',mk:true},{key:'雑費',label:'雑費',fmt:'money',mk:true},
    {key:'販管費計',label:'販管費計',fmt:'money',mk:true,total:true},
    {type:'section',label:'【利益】'},
    {key:'営業利益',label:'営業利益',fmt:'money',mk:true,total:true},
    {key:'営業利益率',label:'消費税引き後利益率',fmt:'pct',total:true},
    {key:'共通費',label:'共通費（本部費用）',fmt:'money',mk:true},
    {key:'経常利益',label:'経常利益',fmt:'money',mk:true,total:true},
    {key:'経常利益率',label:'消費税引き後利益率',fmt:'pct',total:true},
    {key:'当期純利益',label:'当期純利益',fmt:'money',mk:true,total:true},
    {key:'消費税引き後利益',label:'消費税引き後利益',fmt:'money',mk:true,total:true},
    {key:'消費税引き後利益率',label:'消費税引き後利益率',fmt:'pct',total:true},
    {type:'section',label:'【ランチ・ディナー】'},
    {key:'ランチ売上',label:'ランチ売上',fmt:'money',mk:true},{key:'ランチ客数',label:'ランチ客数',fmt:'num'},
    {key:'ランチ客単価',label:'ランチ客単価',fmt:'money',mk:true},{key:'ランチ比率',label:'ランチ比率',fmt:'pct'},
    {key:'ディナー売上',label:'ディナー売上',fmt:'money',mk:true},{key:'ディナー客数',label:'ディナー客数',fmt:'num'},
    {key:'ディナー客単価',label:'ディナー客単価',fmt:'money',mk:true},{key:'ディナー比率',label:'ディナー比率',fmt:'pct'},
  ];

  const rateKeys=new Set(['原価率','人件費率','FL率','営業利益率','経常利益率','消費税引き後利益率','ランチ比率','ディナー比率','現金比率','クレジット比率']);
  let cols,gv;
  if(view==='store'){
    cols=[...new Set(d.map(r=>r.店舗名))].sort();
    gv=(col,row)=>{
      const sd=d.filter(r=>r.店舗名===col);if(!sd.length)return null;
      if(row.isDiff){const a=ta(sk(sd,row.aKey),row.aKey),b=ta(sk(sd,row.bKey),row.bKey);return(a!=null&&b!=null)?a-b:null;}
      if(row.isAch){const a=sk(sd,row.aKey),b=sk(sd,row.bKey);return(a&&b&&b!==0)?a/b*100:null;}
      const raw=rateKeys.has(row.key)?ak(sd,row.key):sk(sd,row.key);
      return row.mk?ta(raw,row.key):raw;
    };
  }else{
    cols=[...new Set(d.map(r=>r.年月))].sort();
    gv=(col,row)=>{
      const md=d.filter(r=>r.年月===col);if(!md.length)return null;
      if(row.isDiff){const a=ta(sk(md,row.aKey),row.aKey),b=ta(sk(md,row.bKey),row.bKey);return(a!=null&&b!=null)?a-b:null;}
      if(row.isAch){const a=sk(md,row.aKey),b=sk(md,row.bKey);return(a&&b&&b!==0)?a/b*100:null;}
      const raw=rateKeys.has(row.key)?ak(md,row.key):sk(md,row.key);
      return row.mk?ta(raw,row.key):raw;
    };
  }

  function fv(v,f,anom,isDiff,isAch){
    if(v==null||isNaN(v))return'<span style="color:#9ca3af">—</span>';
    if(f==='money'){const neg=v<0;const ac=anom&&v>50000?'anomaly':isDiff?(neg?'negative':'positive'):'';return`<span class="${ac}">${neg?'-':''}¥${Math.abs(Math.round(v)).toLocaleString()}</span>`;}
    if(f==='pct'){if(isAch){const cls=v>=100?'positive':'negative';return`<span class="${cls}">${v.toFixed(1)}%</span>`;}return v.toFixed(1)+'%';}
    if(f==='num')return Math.round(v).toLocaleString();
    if(f==='dec')return v.toFixed(1);
    return v;
  }

  const th=`<tr><th>科目</th>`+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';
  const tb=plRows.map(row=>{
    if(row.type==='section')return`<tr class="section"><td colspan="${cols.length+1}">${row.label}</td></tr>`;
    const tds=cols.map(col=>`<td>${fv(gv(col,row),row.fmt,row.anomaly,row.isDiff,row.isAch)}</td>`).join('');
    return`<tr class="${row.total?'total-row':row.rowCls||''}"><td>${row.label}</td>${tds}</tr>`;
  }).join('');

  document.getElementById('plWrap').innerHTML=`<table class="pl-table"><thead>${th}</thead><tbody>${tb}</tbody></table>`;
  document.getElementById('plView').onchange=renderPL;
}

// ── タブ切替 & 全体レンダリング ─────────────────────────
function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  renderAll();
}
function renderAll(){
  renderGroupSummary();
  renderKPI();
  renderHeatmap();
  renderRanking();
  renderTrend();
  renderTime();
  renderPL();
}
renderAll();
</script>
